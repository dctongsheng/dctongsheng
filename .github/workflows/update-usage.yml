name: Update Vibe Usage card

on:
  schedule:
    - cron: '10 16 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate usage card
        run: node scripts/generate-card.mjs
        env:
          VIBE_USAGE_API_KEY: ${{ secrets.VIBE_USAGE_API_KEY }}

      - name: Commit if changed
        run: |
          git config user.name "dctongsheng"
          git config user.email "31836098+dctongsheng@users.noreply.github.com"
          git add vibe-usage-card.svg
          if ! git diff --cached --quiet; then
            git commit -m "chore: update vibe usage card"
            git push
          fi
